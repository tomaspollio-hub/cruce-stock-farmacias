# ============================================================
#  CONFIGURACIÓN — Cruce de Stock por GTIN
#  Editá este archivo para adaptar columnas y reglas.
# ============================================================

# ── ARCHIVO DE PEDIDOS ECOMMERCE ────────────────────────────
pedidos:
  # Nombres posibles de cada columna (en cualquier capitalización)
  col_nro_pedido: ["n° pedido", "nro pedido", "numero pedido", "numero de pedido",
                   "order", "pedido", "identificador", "id pedido", "n pedido"]
  col_estado:    ["estado", "status"]
  col_producto:  ["producto", "product", "nombre"]
  col_variante:  ["variante", "variant", "presentacion"]
  col_marca:     ["marca", "brand"]
  col_sku:       ["sku", "cod_sku"]          # hace match con ID del stock
  col_gtin:      ["gtin", "codigo de barra", "ean", "barcode"]  # hace match con SKU del stock
  col_unidades:  ["unidades", "cantidad", "qty", "units"]

  # Valor del estado que indica pedido activo
  estado_activo: "abierta"

# ── ARCHIVO DE STOCK DE SUCURSALES ──────────────────────────
stock:
  col_id:          ["id", "gtin", "cod_barra", "codigo"]        # GTIN principal
  col_nombre:      ["nombre zetti", "nombre", "producto", "descripcion"]
  col_sku:         ["sku", "codigo de barra", "ean", "barcode"] # código de barra alternativo
  col_marca:       ["marca", "brand"]
  col_fabricante:  ["fabricante", "laboratorio", "distribuidor"]
  col_nodo:        ["nodo", "sucursal", "farmacia", "local"]
  col_stock:       ["stock", "cantidad", "qty", "existencia"]

# ── SUCURSALES Y ZONAS (5 niveles de prioridad) ─────────────
#
#  El matching funciona por SUFIJO del nodo (más confiable):
#  Ej: "APT-RUFINO 1070-NQN" termina en "-NQN" → NQN Capital
#      "GLO-EXP Y PARAGUAY-CEN" termina en "-CEN" → Centenario
#      "TER-OLASCOAGA-717-CCO" termina en "-CCO" → Cutral Co (remota)
#
#  PRIORIDAD 0 — Depósito ecommerce (primera búsqueda siempre)
#  PRIORIDAD 1 — Neuquén Capital
#  PRIORIDAD 2 — Centenario + Plottier
#  PRIORIDAD 3 — Zonas cercanas (Añelo, El Chañar)
#  PRIORIDAD 4 — Remotas (Cutral Co, Zapala, Madryn)

zonas:
  prioridad_0_deposito:
    - "apt-ecommerce-nqn"
    - "apt-ecommerce"
    - "ecommerce-nqn"
    - "ecommerce"
    - "deposito"

  prioridad_1_nqn_capital:
    - "-nqn"        # sufijo estándar Neuquén Capital
    - "nqn"         # sin guión
    - "alderete"
    - "olascoaga"
    - "bahia blanca"
    - "cabellera"
    - "combate"
    - "diagonal"
    - "ramon"
    - "illia"
    - "islas malvinas"
    - "jose rosa"
    - "la rioja"
    - "rio senguer"
    - "rivadavia"
    - "rufino"
    - "san martin"
    - "sarmiento"
    - "alpina"
    - "fotheringham"

  prioridad_2_centenario_plottier:
    - "-cen"        # sufijo Centenario
    - "-plo"        # sufijo Plottier
    - "-plt"
    - "centenario"
    - "paraguay"
    - "honduras"
    - "peru 305"
    - "plottier"
    - "belgrano 245"
    - "buenos aires norte"
    - "buratovich"

  prioridad_3_cercanas:
    - "-ane"        # sufijo Añelo
    - "-cha"        # sufijo El Chañar
    - "anelo"
    - "añelo"
    - "chañar"
    - "chanar"
    - "villa pehuenia"

  prioridad_4_remotas:
    - "-cco"        # sufijo Cutral Co
    - "-zap"        # sufijo Zapala
    - "-mad"        # sufijo Puerto Madryn
    - "-pma"
    - "cutral-co"
    - "cutral co"
    - "cutralco"
    - "zapala"
    - "puerto madryn"
    - "madryn"

# ── ETIQUETAS DE ZONA (para mostrar en la planilla) ──────────
zona_labels:
  "0": "Deposito"
  "1": "NQN Capital"
  "2": "Centenario/Plottier"
  "3": "Cercana"
  "4": "Remota"

# ── REGLAS DE OPTIMIZACIÓN ──────────────────────────────────
optimizacion:
  # Máximo de sucursales a asignar por producto antes de marcar "Llamar cliente"
  max_sucursales_por_producto: 3

  # Máximo de opciones a mostrar en el selector manual de sucursal
  max_opciones_override: 5

  # Stock sospechoso: si una sucursal tiene MÁS de este número de unidades
  # de un producto, se marca como ⚠️ Stock a verificar (probable error de carga)
  stock_sospechoso_umbral: 200

# ── ESTADOS DEL CADETE (dropdown en el Excel de salida) ─────
estados_busqueda:
  - "Búsqueda"
  - "Encontrado"
  - "Mal stock"
  - "Llamar a suc"
  - "Mal stock - Resuelto"
  - "Llamar cliente"

# ── NORMALIZACIÓN GTIN ──────────────────────────────────────
gtin:
  longitud_estandar: 14    # rellenar con ceros a la izquierda hasta este largo
  longitudes_validas: [8, 12, 13, 14]
